name: Publish Quartz site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Quartz site
        uses: konstfish/quartz-build-action@v7
        with:
          source: docs
          destination: public
          page_title: Handbook
          quartz_custom_css: .github/quartz/custom.scss

      - name: Fix published screenshot paths
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs")
          const path = require("path")

          const root = "public"
          const replacements = new Map([
            [
              "../../handbook/guru/assets/images/open-repair-ticket/",
              "https://raw.githubusercontent.com/Hanippa/handbook/gh-pages/guru/assets/images/open-repair-ticket/",
            ],
            [
              "../.././assets/images/open-repair-ticket/",
              "https://raw.githubusercontent.com/Hanippa/handbook/gh-pages/guru/assets/images/open-repair-ticket/",
            ],
          ])

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name)
              if (entry.isDirectory()) {
                walk(fullPath)
              } else if (entry.isFile() && entry.name.endsWith(".html")) {
                let html = fs.readFileSync(fullPath, "utf8")
                for (const [from, to] of replacements) {
                  html = html.split(from).join(to)
                }
                fs.writeFileSync(fullPath, html)
              }
            }
          }

          walk(root)
          NODE

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
