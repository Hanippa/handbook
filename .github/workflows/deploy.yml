name: Publish Quartz site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Quartz site
        uses: konstfish/quartz-build-action@v7
        with:
          source: docs
          page_title: Handbook
          quartz_custom_css: .github/quartz/custom.scss

      - name: Fix published screenshot paths
        run: node .github/scripts/fix-screenshot-paths.cjs
        env:
          QUARTZ_OUTPUT_DIR: _site

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
