name: Publish Quartz site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Quartz site
        uses: konstfish/quartz-build-action@v7
        with:
          source: docs
          destination: public
          page_title: Handbook
          quartz_custom_css: .github/quartz/custom.scss

      - name: Detect Quartz output directory
        run: |
          if [ -d public ]; then
            echo "QUARTZ_OUTPUT_DIR=public" >> "$GITHUB_ENV"
          elif [ -d _site ]; then
            echo "QUARTZ_OUTPUT_DIR=_site" >> "$GITHUB_ENV"
          else
            echo "QUARTZ_OUTPUT_DIR=public" >> "$GITHUB_ENV"
          fi

      - name: Fix published screenshot paths
        run: node .github/scripts/fix-screenshot-paths.cjs

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./${{ env.QUARTZ_OUTPUT_DIR }}
