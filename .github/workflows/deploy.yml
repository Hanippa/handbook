name: Publish Quartz site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Quartz site
        uses: konstfish/quartz-build-action@v7
        with:
          source: docs
          destination: public
          page_title: Handbook
          quartz_custom_css: .github/quartz/custom.scss

      - name: Fix published screenshot paths
        shell: bash
        run: |
          find public -name '*.html' -type f -print0 | xargs -0 sed -i \
            -e 's#../../handbook/guru/assets/images/open-repair-ticket/#https://raw.githubusercontent.com/Hanippa/handbook/gh-pages/guru/assets/images/open-repair-ticket/#g' \
            -e 's#../.././assets/images/open-repair-ticket/#https://raw.githubusercontent.com/Hanippa/handbook/gh-pages/guru/assets/images/open-repair-ticket/#g'

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
